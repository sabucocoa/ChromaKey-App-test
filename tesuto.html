<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChromaClear - Pro UX Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg-main: #0f172a; --bg-card: rgba(30, 41, 59, 0.5); --text-main: #f8fafc; }
        .light-mode { --bg-main: #f1f5f9; --bg-card: rgba(255, 255, 255, 0.8); --text-main: #0f172a; }
        
        body { background-color: var(--bg-main); color: var(--text-main); transition: 0.3s; height: 100vh; overflow: hidden; font-family: sans-serif; display: flex; flex-direction: column; }
        
        /* モード1: 左サイドバー */
        aside.sidebar-mode { 
            width: 300px; position: fixed; height: 100vh; left: -300px; z-index: 50;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        aside.sidebar-mode.open { left: 0; }
        
        /* モード2: 上部コンパクト */
        aside.top-mode { 
            width: 100%; position: relative; height: auto; left: 0; z-index: 40;
            background: var(--bg-card); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; padding: 1rem;
        }

        main { flex: 1; overflow-y: auto; padding: 1rem; width: 100%; transition: 0.3s; }
        .card { background: var(--bg-card); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 1rem; }
        
        #zoomModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; cursor: zoom-out; }
        #zoomModal img { max-width: 95%; max-height: 90%; object-fit: contain; }
        
        /* スポイト待機状態の演出 */
        .pipette-active-mode { ring: 4px solid #3b82f6; cursor: crosshair !important; z-index: 10; }
        .hidden-mode { display: none !important; }
        
        canvas { transition: transform 0.2s; }
        .img-container:active canvas { transform: scale(0.98); }
    </style>
</head>
<body class="dark-mode">

<header class="p-3 bg-slate-900 flex justify-between items-center z-[60] border-b border-white/5">
    <div class="flex items-center gap-2">
        <button id="menuBtn" onclick="toggleSidebar()" class="p-2 bg-blue-600 rounded-lg"><i data-lucide="menu"></i></button>
        <h1 class="font-black italic text-blue-500 text-sm tracking-tighter">ChromaClear</h1>
    </div>
    <div class="flex gap-2">
        <button onclick="switchLayout()" class="text-[10px] bg-slate-800 px-3 py-1.5 rounded-full border border-white/10 flex items-center gap-1">
            <i data-lucide="layout"></i> <span id="layoutText">上部表示へ</span>
        </button>
        <button onclick="toggleTheme()" class="p-2 opacity-50"><i data-lucide="sun-moon" class="w-4 h-4"></i></button>
    </div>
</header>

<aside id="configMenu" class="sidebar-mode p-4 space-y-4 overflow-y-auto">
    <div id="sidebarClose" class="flex justify-between items-center mb-2 sidebar-only">
        <span class="text-xs font-bold text-blue-400 tracking-widest">CONFIG</span>
        <button onclick="toggleSidebar()" class="text-red-400 p-1"><i data-lucide="x"></i></button>
    </div>

    <div class="space-y-2 bg-black/20 p-3 rounded-xl border border-white/5">
        <div class="flex items-center justify-between">
            <span class="text-[10px] font-bold opacity-60 uppercase">Selected Color</span>
            <input type="color" id="globalColor" value="#00ff00" class="w-8 h-8 rounded bg-transparent border-none">
        </div>
        <div class="grid grid-cols-3 gap-1">
            <input type="number" id="valR" value="0" min="0" max="255" oninput="rgbToHex()" class="bg-black/40 p-1 rounded text-[10px] text-center border border-white/5">
            <input type="number" id="valG" value="255" min="0" max="255" oninput="rgbToHex()" class="bg-black/40 p-1 rounded text-[10px] text-center border border-white/5">
            <input type="number" id="valB" value="0" min="0" max="255" oninput="rgbToHex()" class="bg-black/40 p-1 rounded text-[10px] text-center border border-white/5">
        </div>
        <div class="space-y-1">
            <div class="flex justify-between text-[10px]"><span>許容誤差: <span id="tolDisp" class="text-blue-400 font-bold">15</span>%</span></div>
            <input type="range" id="globalTol" min="0" max="100" step="5" value="15" oninput="syncTol(this.value)" class="w-full h-1">
        </div>
    </div>

    <div class="space-y-2 bg-black/20 p-3 rounded-xl border border-white/5">
        <span class="text-[10px] font-bold opacity-60 uppercase">Export Options</span>
        <input type="text" id="filePrefix" placeholder="ファイル名" class="w-full bg-black/40 p-2 rounded text-[10px] border border-white/5 outline-none focus:border-blue-500">
        <div class="flex gap-1">
            <select id="saveFormat" class="flex-1 bg-black/40 p-1 rounded text-[10px] border border-white/5 outline-none"><option value="image/png">PNG</option><option value="image/jpeg">JPG</option></select>
            <select id="downloadMode" class="flex-1 bg-black/40 p-1 rounded text-[10px] border border-white/5 outline-none"><option value="zip">ZIP</option><option value="individual">単体</option></select>
        </div>
        <label class="flex items-center gap-2 text-[9px] opacity-70 cursor-pointer"><input type="checkbox" id="includeTime" checked class="accent-blue-500"> タイムスタンプを付与</label>
    </div>

    <div class="grid grid-cols-2 gap-2">
        <button onclick="processAll()" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-[10px] font-bold flex items-center justify-center gap-1 transition-colors"><i data-lucide="zap" class="w-3 h-3"></i> 一括処理</button>
        <button onclick="bulkDownload()" class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl text-[10px] font-bold flex items-center justify-center gap-1 transition-colors"><i data-lucide="download" class="w-3 h-3"></i> 保存</button>
    </div>
</aside>

<main id="main">
    <div id="dropZone" class="border-2 border-dashed border-slate-700 rounded-3xl p-6 text-center hover:border-blue-500/50 mb-6 card transition-all cursor-pointer">
        <i data-lucide="plus" class="mx-auto w-8 h-8 mb-2 text-blue-500"></i>
        <p class="text-[10px] font-bold opacity-60">画像を追加 (ドラッグ＆ドロップ対応)</p>
        <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
    </div>
    <div id="imageGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
</main>

<div id="zoomModal" onclick="this.style.display='none'"><img id="zoomImg"></div>

<script>
    lucide.createIcons();
    let imageDataList = [];
    let isTopMode = false;

    function switchLayout() {
        const menu = document.getElementById('configMenu');
        const btn = document.getElementById('menuBtn');
        const text = document.getElementById('layoutText');
        isTopMode = !isTopMode;
        if (isTopMode) {
            menu.classList.replace('sidebar-mode', 'top-mode'); menu.classList.remove('open');
            btn.classList.add('hidden-mode'); text.innerText = "サイド表示へ";
            document.querySelectorAll('.sidebar-only').forEach(el => el.classList.add('hidden-mode'));
        } else {
            menu.classList.replace('top-mode', 'sidebar-mode');
            btn.classList.remove('hidden-mode'); text.innerText = "上部表示へ";
            document.querySelectorAll('.sidebar-only').forEach(el => el.classList.remove('hidden-mode'));
        }
    }

    function toggleSidebar() { if(!isTopMode) document.getElementById('configMenu').classList.toggle('open'); }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    const cp = document.getElementById('globalColor'), rIn = document.getElementById('valR'), gIn = document.getElementById('valG'), bIn = document.getElementById('valB');
    cp.oninput = (e) => {
        const h = e.target.value;
        rIn.value = parseInt(h.slice(1,3), 16); gIn.value = parseInt(h.slice(3,5), 16); bIn.value = parseInt(h.slice(5,7), 16);
    };
    function rgbToHex() {
        const r = Math.max(0, Math.min(255, +rIn.value)), g = Math.max(0, Math.min(255, +gIn.value)), b = Math.max(0, Math.min(255, +bIn.value));
        cp.value = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }
    function syncTol(v) {
        document.getElementById('globalTol').value = v;
        document.getElementById('tolDisp').innerText = v;
    }

    const fileInput = document.getElementById('fileInput');
    document.getElementById('dropZone').onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);
    document.getElementById('dropZone').addEventListener('dragover', (e) => { e.preventDefault(); e.currentTarget.style.borderColor = "#3b82f6"; });
    document.getElementById('dropZone').addEventListener('dragleave', (e) => { e.preventDefault(); e.currentTarget.style.borderColor = ""; });
    document.getElementById('dropZone').addEventListener('drop', (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); });

    function handleFiles(files) {
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    imageDataList.push({ id: Date.now() + Math.random(), original: img, processed: null, isPicking: false });
                    renderGrid();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function renderGrid() {
        const grid = document.getElementById('imageGrid');
        grid.innerHTML = '';
        imageDataList.forEach(item => {
            const card = document.createElement('div');
            card.className = "card p-2 relative flex flex-col gap-2 animate-in fade-in duration-300";
            card.innerHTML = `
                <button onclick="removeImg(${item.id})" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-1 z-20 shadow-lg hover:bg-red-600"><i data-lucide="x" class="w-2 h-2"></i></button>
                <div class="img-container aspect-square bg-black/10 rounded-lg overflow-hidden flex items-center justify-center relative group ${item.isPicking ? 'pipette-active-mode' : ''}">
                    <canvas id="canvas-${item.id}" class="max-w-full max-h-full" onclick="handleCanvasClick(event, ${item.id})"></canvas>
                    ${!item.isPicking ? '<div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 pointer-events-none flex items-center justify-center text-[8px] font-bold uppercase tracking-widest">Click to Zoom</div>' : ''}
                </div>
                <div class="flex gap-1">
                    <button onclick="processSingle(${item.id})" class="flex-1 bg-blue-600/20 text-blue-400 py-1.5 rounded-lg text-[9px] font-bold uppercase hover:bg-blue-600 hover:text-white transition-colors">透過</button>
                    <button onclick="togglePipette(${item.id})" class="py-1.5 px-2 rounded-lg transition-colors ${item.isPicking ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-700/50 text-white hover:bg-slate-700'}">
                        <i data-lucide="pipette" class="w-3 h-3"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);
            drawInitial(item);
        });
        lucide.createIcons();
    }

    function drawInitial(item) {
        const canvas = document.getElementById(`canvas-${item.id}`);
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = item.original.width; canvas.height = item.original.height;
        ctx.drawImage(item.original, 0, 0);
    }

    // キャンバスのクリックハンドラ（拡大かスポイトか）
    function handleCanvasClick(e, id) {
        const item = imageDataList.find(i => i.id === id);
        if (item.isPicking) {
            pickColor(e, id);
        } else {
            zoomCanvas(id);
        }
    }

    // スポイトモードの切り替え
    function togglePipette(id) {
        imageDataList.forEach(item => {
            if (item.id === id) item.isPicking = !item.isPicking;
            else item.isPicking = false; // 他のスポイトは解除
        });
        renderGrid();
    }

    function pickColor(e, id) {
        const c = e.target;
        const r = c.getBoundingClientRect();
        const x = (e.clientX - r.left) * (c.width / r.width);
        const y = (e.clientY - r.top) * (c.height / r.height);
        const p = c.getContext('2d').getImageData(x, y, 1, 1).data;
        rIn.value = p[0]; gIn.value = p[1]; bIn.value = p[2];
        rgbToHex();
        
        // 色を取ったらスポイトモード解除
        const item = imageDataList.find(i => i.id === id);
        item.isPicking = false;
        renderGrid();
    }

    function zoomCanvas(id) {
        const canvas = document.getElementById(`canvas-${id}`);
        document.getElementById('zoomImg').src = canvas.toDataURL();
        document.getElementById('zoomModal').style.display = 'flex';
    }

    function processSingle(id) {
        const item = imageDataList.find(i => i.id === id);
        const canvas = document.getElementById(`canvas-${id}`);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(item.original, 0, 0);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const tr = +rIn.value, tg = +gIn.value, tb = +bIn.value, tol = +document.getElementById('globalTol').value * 2.55;
        for (let i = 0; i < data.length; i += 4) {
            const d = Math.sqrt(Math.pow(data[i]-tr,2) + Math.pow(data[i+1]-tg,2) + Math.pow(data[i+2]-tb,2));
            if (d < tol) data[i+3] = 0;
        }
        ctx.putImageData(imgData, 0, 0);
        item.processed = canvas.toDataURL(document.getElementById('saveFormat').value);
    }

    function processAll() { imageDataList.forEach(i => processSingle(i.id)); }
    function removeImg(id) { imageDataList = imageDataList.filter(i => i.id !== id); renderGrid(); }

    async function bulkDownload() {
        const zip = new JSZip();
        const prefix = document.getElementById('filePrefix').value || "chroma";
        const fmt = document.getElementById('saveFormat').value;
        const ext = fmt === 'image/png' ? 'png' : 'jpg';
        const d = new Date();
        const dStr = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0');
        for (let i = 0; i < imageDataList.length; i++) {
            if (!imageDataList[i].processed) processSingle(imageDataList[i].id);
            let n = `${prefix}_${document.getElementById('includeTime').checked ? dStr+'_' : ''}${String(i+1).padStart(3, '0')}.${ext}`;
            const url = imageDataList[i].processed;
            if (document.getElementById('downloadMode').value === 'zip') { zip.file(n, url.split(',')[1], {base64: true}); } 
            else { const l = document.createElement('a'); l.download = n; l.href = url; l.click(); }
        }
        if (document.getElementById('downloadMode').value === 'zip' && imageDataList.length > 0) {
            const c = await zip.generateAsync({type: "blob"});
            const l = document.createElement('a'); l.href = URL.createObjectURL(c); l.download = `${prefix}.zip`; l.click();
        }
    }
</script>
</body>
</html>
